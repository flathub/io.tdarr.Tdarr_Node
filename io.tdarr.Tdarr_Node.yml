app-id: io.tdarr.Tdarr_Node
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: tdarr-node-flatpak
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-videos
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/gtk-doc
  - /share/man

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: leptonica
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/DanBloomberg/leptonica/releases/download/1.79.0/leptonica-1.79.0.tar.gz
        sha256: 045966c9c5d60ebded314a9931007a56d9d2f7a6ac39cb5cc077c816f62300d8
    cleanup:
      - /bin

  - name: tesseract
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --disable-graphics
      - --disable-opencl
    sources:
      - type: archive
        url: https://github.com/tesseract-ocr/tesseract/archive/refs/tags/4.1.1.tar.gz
        sha256: 2a66ff0d8595bff8f04032165e6c936389b1e5727c3ce5a27b3e059d218db1cb
      - type: patch
        path: patches/tesseract-4.1.1-flatpak-build.patch
    cleanup:
      - /bin
      - /share/tessdata

  - name: perl
    buildsystem: simple
    build-commands:
      - ./Configure -des -Dprefix=/app -Dvendorprefix=/app -Dsiteprefix=/app -Duseshrplib -Duseithreads -Duselargefiles -Dman1dir=none -Dman3dir=none
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - make install
      - find /app/lib/perl5 -type f -exec chmod u+w {} \;
      - install -Dm755 perl /app/bin/perl
    sources:
      - type: archive
        url: https://www.cpan.org/src/5.0/perl-5.42.2.tar.xz
        sha256: 0a585eeb9e363c0f80482ddb3571625250c2c86aeb408853e8ea50805cfb14bb
    cleanup:
      - /share

  - name: tdarr-node
    buildsystem: simple
    build-commands:
      - mkdir -p /app/tdarr/node
      - cp -a tdarr-node/. /app/tdarr/node/
      - chmod +x /app/tdarr/node/Tdarr_Node
      - chmod +x /app/tdarr/node/Tdarr_Node_Tray
      - chmod +x /app/tdarr/node/runtime/Tdarr_Node_Runtime
      - chmod +x /app/tdarr/node/runtime/pnpm
      - chmod +x /app/tdarr/node/node_modules/exiftool-vendored.pl/bin/exiftool
      - mkdir -p /app/bin
      - ln -sf /app/tdarr/node/Tdarr_Node_Tray /app/bin/tdarr-node-flatpak
      - install -Dm644 integration/io.tdarr.Tdarr_Node.desktop /app/share/applications/io.tdarr.Tdarr_Node.desktop
      - install -Dm644 integration/io.tdarr.Tdarr_Node.metainfo.xml /app/share/metainfo/io.tdarr.Tdarr_Node.metainfo.xml
      - install -Dm644 integration/logo512.png /app/share/icons/hicolor/512x512/apps/io.tdarr.Tdarr_Node.png
      - install -Dm644 integration/LICENSE.md /app/share/licenses/io.tdarr.Tdarr_Node/LICENSE.md
    sources:
      - type: archive
        url: https://storage.tdarr.io/versions/2.76.01/linux_x64/Tdarr_Node.zip
        sha256: e92e14f35f84816684c6152b727e35ef85c8f92f2307aa5e69d48a7eb0d9e442
        strip-components: 0
        dest: tdarr-node
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/6fe94f3d6916310e27c232ebd34910d7f7773ff0/flatpak/io.tdarr.Tdarr_Node.desktop
        sha256: 27fb6d8ac9a6be9c43cb7596542cb47eb8df2fbe94466770cd9f107781718618
        dest: integration
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/07a7890e0a7ffb2a8a0a28566e0d4131e51f935b/flatpak/io.tdarr.Tdarr_Node.metainfo.xml
        sha256: a759443c3dc102c02c9559f8edc213e6178e6be7825ff88c39b916094fc6fc9a
        dest: integration
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/2ee6e059ffe01e463d25990eb94818925c5b04f5/flatpak/io.tdarr.Tdarr_Node.png
        sha256: 62cf160aebb01668d038714003f7866cd23c0c92d1eb1bc57bc2acc68c74865b
        dest: integration
        dest-filename: logo512.png
      - type: file
        url: https://raw.githubusercontent.com/HaveAGitGat/Tdarr/0ce823ca459e1a1a079c096506691cad801237bf/LICENSE.md
        sha256: 0dede92d4421de2668e268783a03c5834078f81a8c694f59900e43a40528c4cf
        dest: integration
        dest-filename: LICENSE.md
